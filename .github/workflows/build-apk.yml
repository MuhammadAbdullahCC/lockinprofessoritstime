name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use pwa-to-apk action
        uses: ruzickap/action-pwa-to-apk@v1
        with:
          app-name: 'Whimsy S1'
          app-short-name: 'Whimsy'
          app-package: 'com.whimsy.s1'
          app-start-url: 'index.html'
          app-background-color: '#f9f0ff'
          app-theme-color: '#c58bcf'
          # The icon is read from manifest.json
          # So we don't need to pass it here

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: whimsy-s1-apk
          path: output/*.apk  # The action outputs APK in 'output' folder
